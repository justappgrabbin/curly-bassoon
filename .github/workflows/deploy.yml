name: Deploy

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - uses: actions/setup-node@v4
        with:
          node-version: '24'
      
      - run: npm install
      
      - run: npm run build
      
      - uses: nwtgck/actions-netlify@v3.0
        with:
          publish-dir: './out'
          production-deploy: true
        env:
          NETLIFY_AUTH_TOKEN: ${{ secrets.NETLIFY_AUTH_TOKEN }}
          NETLIFY_SITE_ID: ${{ secrets.NETLIFY_SITE_ID }}
          module.exports = nextConfig
          EOF
          fi

          # Create netlify.toml if missing
          if [ ! -f "netlify.toml" ]; then
            echo "Creating netlify.toml..."
            cat > netlify.toml << 'EOF'
          [build]
            command = "npm run build"
            publish = "out"
          [build.environment]
            NODE_VERSION = "24"
          EOF
          fi

          # Create tailwind config if missing
          if [ ! -f "tailwind.config.ts" ] && [ ! -f "tailwind.config.js" ]; then
            echo "Creating tailwind.config.ts..."
            cat > tailwind.config.ts << 'EOF'
          import type { Config } from 'tailwindcss'
          const config: Config = {
            content: ['./app/**/*.{js,ts,jsx,tsx}', './components/**/*.{js,ts,jsx,tsx}'],
            theme: { extend: {} },
            plugins: [],
          }
          export default config
          EOF
          fi

      # Install dependencies (creates package-lock.json if missing)
      - name: Install dependencies
        run: npm install

      # Type check (skip if no TS config)
      - name: Type check
        run: |
          if [ -f "tsconfig.json" ]; then
            npx tsc --noEmit
          else
            echo "No tsconfig.json, skipping type check"
          fi

      # Build
      - name: Build
        run: npm run build

      # Verify build output exists
      - name: Verify build
        run: |
          if [ ! -d "out" ]; then
            echo "ERROR: Build output 'out' folder not found!"
            exit 1
          fi
          echo "Build successful, output ready"

      - name: Upload build
        uses: actions/upload-artifact@v4
        with:
          name: build-files
          path: out/

  deploy:
    runs-on: ubuntu-latest
    needs: setup-and-build
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    
    steps:
      - name: Download build
        uses: actions/download-artifact@v4
        with:
          name: build-files
          path: out/

      - name: Deploy to Netlify
        uses: nwtgck/actions-netlify@v3.0
        with:
          publish-dir: './out'
          production-deploy: true
          github-token: ${{ secrets.GITHUB_TOKEN }}
        env:
          NETLIFY_AUTH_TOKEN: ${{ secrets.NETLIFY_AUTH_TOKEN }}
          NETLIFY_SITE_ID: ${{ secrets.NETLIFY_SITE_ID }}
