'use client';

import { useState, useCallback } from 'react';
import { Intent } from '@/types/sentient';

export function useLearning() {
  const [isReady] = useState(true);
  
  const predict = useCallback(async (intent: Intent): Promise<number[]> => {
    return new Array(8).fill(0.5);
  }, []);

  const learn = useCallback(async () => {}, []);
  
  return { isReady, predict, learn, saveModel: async () => {}, loadModel: async () => false };
}
