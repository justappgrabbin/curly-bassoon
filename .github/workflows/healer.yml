name: 🔧 Repo Healer

on:
  push:
    branches: [main, master]
  workflow_dispatch:  # Manual trigger

jobs:
  diagnose-and-heal:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: 🔍 Diagnose Issues
        id: diagnose
        run: |
          echo "=== DIAGNOSIS ==="
          
          # Check 1: Is package.json present?
          if [ ! -f "package.json" ]; then
            echo "❌ MISSING: package.json"
            echo "package_missing=true" >> $GITHUB_OUTPUT
          else
            echo "✅ package.json found"
          fi
          
          # Check 2: Is .github/workflows present?
          if [ ! -d ".github/workflows" ]; then
            echo "❌ MISSING: .github/workflows directory"
            echo "workflows_missing=true" >> $GITHUB_OUTPUT
          else
            echo "✅ .github/workflows found"
          fi
          
          # Check 3: Is next.config.js present?
          if [ ! -f "next.config.js" ] && [ ! -f "next.config.ts" ] && [ ! -f "next.config.mjs" ]; then
            echo "❌ MISSING: next.config.js"
            echo "config_missing=true" >> $GITHUB_OUTPUT
          else
            echo "✅ next.config found"
          fi
          
          # Check 4: Check package.json content
          if [ -f "package.json" ]; then
            if ! grep -q '"next"' package.json; then
              echo "❌ ERROR: Next.js not in dependencies"
              echo "next_missing=true" >> $GITHUB_OUTPUT
            fi
            
            if ! grep -q '"build"' package.json; then
              echo "❌ ERROR: No build script"
              echo "build_script_missing=true" >> $GITHUB_OUTPUT
            fi
          fi

      - name: 🏥 Heal Missing Files
        if: steps.diagnose.outputs.package_missing == 'true' || steps.diagnose.outputs.config_missing == 'true'
        run: |
          echo "=== HEALING ==="
          
          # Create package.json if missing
          if [ ! -f "package.json" ]; then
            echo "Creating package.json..."
            cat > package.json << 'EOF'
{
  "name": "trident-sentient",
  "version": "1.0.0",
  "private": true,
  "scripts": {
    "dev": "next dev",
    "build": "next build",
    "start": "next start",
    "lint": "next lint",
    "type-check": "tsc --noEmit"
  },
  "dependencies": {
    "next": "14.2.0",
    "react": "^18.2.0",
    "react-dom": "^18.2.0",
    "framer-motion": "^11.0.0",
    "zustand": "^4.5.0",
    "lucide-react": "^0.300.0"
  },
  "devDependencies": {
    "@types/node": "^20.0.0",
    "@types/react": "^18.2.0",
    "typescript": "^5.3.0",
    "tailwindcss": "^3.4.0",
    "postcss": "^8.4.0",
    "autoprefixer": "^10.4.0"
  }
}
EOF
          fi
          
          # Create next.config.js if missing
          if [ ! -f "next.config.js" ] && [ ! -f "next.config.ts" ] && [ ! -f "next.config.mjs" ]; then
            echo "Creating next.config.js..."
            cat > next.config.js << 'EOF'
/** @type {import('next').NextConfig} */
const nextConfig = {
  output: 'export',
  distDir: 'out',
  images: {
    unoptimized: true,
  },
}

module.exports = nextConfig
EOF
          fi
          
          # Create tailwind.config.ts if missing
          if [ ! -f "tailwind.config.ts" ] && [ ! -f "tailwind.config.js" ]; then
            echo "Creating tailwind.config.ts..."
            cat > tailwind.config.ts << 'EOF'
import type { Config } from 'tailwindcss'

const config: Config = {
  content: [
    './pages/**/*.{js,ts,jsx,tsx,mdx}',
    './components/**/*.{js,ts,jsx,tsx,mdx}',
    './app/**/*.{js,ts,jsx,tsx,mdx}',
  ],
  theme: {
    extend: {
      colors: {
        void: '#0a0a0a',
        voice: '#1a1a2e',
        generate: '#16213e',
        preview: '#0f3460',
        network: '#533483',
        self: '#e94560',
      },
    },
  },
  plugins: [],
}

export default config
EOF
          fi
          
          # Create tsconfig.json if missing
          if [ ! -f "tsconfig.json" ]; then
            echo "Creating tsconfig.json..."
            cat > tsconfig.json << 'EOF'
{
  "compilerOptions": {
    "target": "ES2020",
    "lib": ["dom", "dom.iterable", "esnext"],
    "allowJs": true,
    "skipLibCheck": true,
    "strict": true,
    "noEmit": true,
    "esModuleInterop": true,
    "module": "esnext",
    "moduleResolution": "bundler",
    "resolveJsonModule": true,
    "isolatedModules": true,
    "jsx": "preserve",
    "incremental": true,
    "plugins": [{ "name": "next" }],
    "paths": {
      "@/*": ["./*"]
    }
  },
  "include": ["next-env.d.ts", "**/*.ts", "**/*.tsx", ".next/types/**/*.ts"],
  "exclude": ["node_modules"]
}
EOF
          fi

      - name: 📁 Create Directory Structure
        run: |
          mkdir -p app
          mkdir -p components
          mkdir -p hooks
          mkdir -p lib
          mkdir -p types
          mkdir -p .github/workflows

      - name: 📝 Commit Healed Files
        run: |
          git config --local user.email "healer@github.com"
          git config --local user.name "Repo Healer"
          
          git add -A
          
          if git diff --staged --quiet; then
            echo "✅ No changes needed - repo is healthy!"
          else
            git commit -m "🔧 Heal: Add missing config files [skip ci]"
            git push
            echo "✅ Healed and pushed fixes!"
          fi

  # Deploy after healing
  deploy:
    runs-on: ubuntu-latest
    needs: diagnose-and-heal
    if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master'
    
    steps:
      - name: Checkout (fresh)
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm install

      - name: Build
        run: npm run build

      - name: Deploy to Netlify
        uses: nwtgck/actions-netlify@v3.0
        with:
          publish-dir: './out'
          production-deploy: true
          github-token: ${{ secrets.GITHUB_TOKEN }}
        env:
          NETLIFY_AUTH_TOKEN: ${{ secrets.NETLIFY_AUTH_TOKEN }}
          NETLIFY_SITE_ID: ${{ secrets.NETLIFY_SITE_ID }}
